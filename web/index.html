<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tablero de Auditoria AR</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-mark">AR</div>
            <div>
              <h1>Tablero AR</h1>
              <p>Fuente local de verdad</p>
            </div>
          </div>
          <label class="upload-card" for="fileInput">
            <span class="upload-icon">+</span>
            <strong>Importar Excel</strong>
            <small>Reporte de balance AR .xlsx</small>
          </label>
          <input id="fileInput" type="file" accept=".xlsx,.xlsm,.xltx,.xltm" hidden />
          <label class="upload-card compact" for="jsonInput">
            <span class="upload-icon">J</span>
            <strong>Importar JSON</strong>
            <small>Respaldo del tablero</small>
          </label>
          <input id="jsonInput" type="file" accept=".json,application/json" hidden />
          <div class="source-panel">
            <span class="panel-label">Fuente Actual</span>
            <strong id="sourceFile">No hay archivo importado</strong>
            <small id="sourceMeta">Importa tu reporte de AR para comenzar.</small>
          </div>
        </div>
        <div class="sidebar-footer">
          <a class="ghost-link" href="/api/export.xlsx">Exportar Excel</a>
          <a class="ghost-link" href="/api/export.csv">Exportar CSV</a>
          <a class="ghost-link" href="/api/export.json">Respaldo JSON</a>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="search-wrap">
            <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
            <input id="searchInput" type="search" placeholder="Buscar cliente, codigo, documento, nota..." />
          </div>
          <select id="issueFilter" aria-label="Filtro de hallazgo">
            <option value="all">Todos los hallazgos</option>
          </select>
          <select id="balanceFilter" aria-label="Filtro de balance">
            <option value="all">Todos los balances</option>
            <option value="negative">Solo negativos</option>
            <option value="mixed">Balances mixtos</option>
            <option value="over360">Mas de 360 dias</option>
            <option value="activity2019">Tiene facturas 2019+</option>
            <option value="oldCarryforward">Balance viejo + actividad nueva</option>
            <option value="oldOnly">Solo balances viejos</option>
            <option value="unassigned">Sin asignar</option>
          </select>
          <button id="clearFilters" class="button secondary" type="button">Limpiar</button>
        </header>

        <section class="kpis" id="kpis"></section>

        <section class="board" id="board" aria-label="Tablero kanban de auditoria AR"></section>
      </main>

      <aside class="detail-drawer" id="detailDrawer" aria-live="polite"></aside>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
